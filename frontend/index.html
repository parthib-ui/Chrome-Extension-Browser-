<!DOCTYPE html>
<html>
<head>
    <title>Phishing API Panel</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <h1>Phishing API Dashboard</h1>

    <hr>

    <button class="btn btn-success" onclick="generateKey()">
        Generate API Key
    </button>

    <br><br>

    <input
        id="apikey"
        class="form-control"
        placeholder="API Key"
    />

    <br>

    <input
        id="url"
        class="form-control"
        placeholder="Enter URL"
    />

    <br>

    <button class="btn btn-primary" onclick="checkUrl()">
        Check URL
    </button>

    <br><br>

    <pre id="result"></pre>

</div>

<script>

const BASE = "http://98.81.87.78"

async function generateKey() {

    const res = await fetch(BASE + "/generate-key", {
        method: "POST"
    })

    const data = await res.json()

    document.getElementById("apikey").value = data.api_key
}


async function checkUrl() {

    const key = document.getElementById("apikey").value
    const url = document.getElementById("url").value

    const res = await fetch(
        BASE + "/check?url=" + url,
        {
            headers: {
                "x-api-key": key
            }
        }
    )

    const data = await res.json()

    document.getElementById("result").innerText =
        JSON.stringify(data, null, 2)
}

</script>

</body>
</html>
