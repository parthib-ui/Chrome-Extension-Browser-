<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL SENTINEL — Safe Browsing Checker</title>
  <meta name="description" content="Check any URL for phishing, malware, or suspicious activity before visiting it." />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="page">
    <div class="card">

      <div class="logo-wrap">
        <div class="logo-icon"><img
            src="/assets/pngtree-blue-shield-badge-clipart-illustration-png-image_16042877-removebg-preview.png" alt=""
            width="250px">
        </div>
        <div class="logo-title">URL SENTINEL</div>
      </div>
      <div class="logo-sub">Powered by VirusTotal · Check any URL before you visit</div>

      <!-- API KEY ROW -->
      <div class="api-row">
        <div class="input-wrap" style="margin:0">
          <label for="apikey">API Key <span style="color:#444;font-weight:400">(optional – higher limits)</span></label>
          <input id="apikey" class="input-field" type="text" placeholder="Paste your API key…" autocomplete="off" />
        </div>
        <button id="genKeyBtn" class="btn btn-sm" onclick="generateKey()" style="margin-top:22px">
          Generate Key
        </button>
      </div>

      <div class="divider"></div>

      <!-- URL INPUT -->
      <div class="input-wrap">
        <label for="urlInput">URL to Check</label>
        <input id="urlInput" class="input-field" type="text" placeholder="https://example.com" autocomplete="off"
          spellcheck="false" />
      </div>

      <button id="scanBtn" class="btn btn-primary" onclick="scanUrl()">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Scan &amp; Check URL</span>
      </button>

      <!-- RESULT -->
      <div id="resultBox" class="result-box"></div>

      <!-- ERROR -->
      <div id="errorMsg" class="error-msg"></div>

    </div>
    <div class="footer">URL Shield &copy; 2026 &middot; Scans powered by VirusTotal</div>
  </div>

  <script src="script.js"></script>
</body>

</html>
