<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚠️ Warning — Unsafe URL | URL Sentinel</title>
  <meta name="description" content="This URL has been flagged as potentially dangerous by URL Sentinel." />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="warn-body">

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
  <a class="nav-logo" href="index.html">
    <img src="/assets/pngtree-blue-shield-badge-clipart-illustration-png-image_16042877-removebg-preview.png" alt="URL Sentinel Logo" />
    <span class="nav-logo-text">URL SENTINEL</span>
  </a>
  <span class="nav-badge" id="navBadge" style="border-color:rgba(239,68,68,0.3);color:#ef4444;background:rgba(239,68,68,0.08);">⚠ Threat Detected</span>
</nav>

<!-- ===== WARNING PAGE ===== -->
<div class="warn-page" id="warnPage">
  <div class="warn-card" id="warnCard">

    <!-- Pulsing icon -->
    <div class="warn-icon malicious" id="warnIcon">🚨</div>

    <!-- Heading -->
    <h1 class="warn-heading malicious" id="warnHeading">Malicious URL Detected</h1>

    <!-- Description -->
    <p class="warn-desc" id="warnDesc">
      This URL has been identified as <strong>malicious</strong> by multiple security engines.
      Visiting this site may expose you to malware, phishing, or identity theft.
    </p>

    <!-- URL box -->
    <div class="warn-url-box">
      <div class="warn-url-label">Destination URL</div>
      <div class="warn-url-value" id="warnUrl">—</div>
    </div>

    <!-- Stats -->
    <div class="warn-stats" id="warnStats" style="display:none">
      <div class="warn-stat">
        <div class="ws-val m" id="statM">0</div>
        <div class="ws-lbl">Malicious</div>
      </div>
      <div class="warn-stat">
        <div class="ws-val s" id="statS">0</div>
        <div class="ws-lbl">Suspicious</div>
      </div>
      <div class="warn-stat">
        <div class="ws-val h" id="statH">0</div>
        <div class="ws-lbl">Harmless</div>
      </div>
      <div class="warn-stat">
        <div class="ws-val u" id="statU">0</div>
        <div class="ws-lbl">Undetected</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="warn-actions">
      <button class="warn-btn-back" onclick="goBack()">← Go Back to Safety</button>
      <button class="warn-btn-proceed malicious" id="proceedBtn" onclick="proceedAnyway()">
        ⚠ Proceed Anyway
      </button>
    </div>

    <a href="index.html" class="warn-back-link">← Scan a different URL</a>
  </div>
</div>

<script>
  const rawData  = sessionStorage.getItem("warnData");
  const targetUrl = sessionStorage.getItem("warnUrl");

  if (!rawData || !targetUrl) { window.location.href = "index.html"; }

  const data   = JSON.parse(rawData);
  const status = data.status;

  const cfg = {
    MALICIOUS:  { icon:"🚨", cls:"malicious",  bgCls:"",               badgeTxt:"⚠ Malicious URL",  badgeStyle:"border-color:rgba(239,68,68,0.3);color:#ef4444;background:rgba(239,68,68,0.08);",  heading:"Malicious URL Detected",  desc:`This URL has been flagged as <strong>MALICIOUS</strong> by VirusTotal security engines. Visiting this site may expose you to malware, phishing attacks, or identity theft. We strongly recommend <strong>not</strong> proceeding.` },
    SUSPICIOUS: { icon:"⚠️", cls:"suspicious", bgCls:"suspicious-bg",  badgeTxt:"⚠ Suspicious URL", badgeStyle:"border-color:rgba(245,158,11,0.3);color:#f59e0b;background:rgba(245,158,11,0.08);", heading:"Suspicious URL",          desc:`This URL appears <strong>SUSPICIOUS</strong> based on our analysis. It exhibits patterns commonly linked to phishing, scam pages, or deceptive content. Proceed only if you fully trust the source.` },
    UNKNOWN:    { icon:"❓", cls:"unknown",    bgCls:"unknown-bg",     badgeTxt:"? Unknown URL",     badgeStyle:"border-color:rgba(167,139,250,0.3);color:#a78bfa;background:rgba(167,139,250,0.08);",heading:"Unknown URL",             desc:`This URL is <strong>UNKNOWN</strong> — our scanners have limited data on it. It hasn't been verified as safe. We advise caution before proceeding.` },
  };

  const c = cfg[status] || cfg["UNKNOWN"];

  // Apply classes
  document.getElementById("warnPage").classList.add(c.bgCls);
  document.getElementById("warnCard").className = `warn-card ${c.cls}-card`;
  document.getElementById("warnIcon").className = `warn-icon ${c.cls}`;
  document.getElementById("warnIcon").textContent = c.icon;
  document.getElementById("warnHeading").className = `warn-heading ${c.cls}`;
  document.getElementById("warnHeading").textContent = c.heading;
  document.getElementById("warnDesc").innerHTML = c.desc;
  document.getElementById("navBadge").innerHTML = c.badgeTxt;
  document.getElementById("navBadge").style.cssText = c.badgeStyle;
  document.getElementById("warnUrl").textContent = targetUrl;

  // Stats
  if (data.stats) {
    document.getElementById("statM").textContent = data.stats.malicious  ?? 0;
    document.getElementById("statS").textContent = data.stats.suspicious ?? 0;
    document.getElementById("statH").textContent = data.stats.harmless   ?? 0;
    document.getElementById("statU").textContent = data.stats.undetected ?? 0;
    document.getElementById("warnStats").style.display = "grid";
  }

  // Proceed button colour
  const pb = document.getElementById("proceedBtn");
  pb.className = `warn-btn-proceed ${c.cls}`;

  function goBack() {
    if (history.length > 1) { history.back(); } else { window.location.href = "index.html"; }
  }

  function proceedAnyway() {
    pb.disabled = true;
    pb.textContent = "Redirecting…";
    sessionStorage.removeItem("warnData");
    sessionStorage.removeItem("warnUrl");
    window.location.href = targetUrl;
  }
</script>
</body>
</html>
